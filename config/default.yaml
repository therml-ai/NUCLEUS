log_dir:
checkpoint_path:
commit_sha:

seed: 42

nodes: 1
devices: 1

max_epochs:
max_steps: 100000
val_check_interval: 5000
batch_size: 16
accumulate_grad_batches: 1

history_time_window: 8
future_time_window: 8
time_step: 1
start_time: 100

defaults:
  - _self_
  - data_cfg: poolboiling64
  - model_cfg: nucleus2/nucleus2_experiment
  - optim_cfg: adamw
  - scheduler_cfg: cosine_warmup
  - normalizer_cfg: standard