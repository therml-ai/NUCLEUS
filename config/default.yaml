log_dir: /pub/afeeney/bubbleformer_logs
seed: 42

nodes: 1
devices: 1

max_epochs: 40
batch_size: 16
accumulate_grad_batches: 1

history_time_window: 8
future_time_window: 8
time_step: 1
start_time: 100

checkpoint_path:
commit_sha:

use_wandb: False
wandb_tags:
  - time-window-5
  - poolboiling
  - AdamW-optimizer
defaults:
  - _self_
  - data_cfg: poolboiling64
  - model_cfg: neighbor_moe/neighbor_moe_exp
  - optim_cfg: adamw
  - scheduler_cfg: cosine_warmup
  - normalizer_cfg: standard