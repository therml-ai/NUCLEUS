log_dir: /pub/afeeney/bubbleformer_logs
seed: 42

nodes: 1
devices: 1

max_epochs:
max_steps: 40000
val_check_interval: 2000
batch_size: 16
accumulate_grad_batches: 1

history_time_window: 8
future_time_window: 8
time_step: 1
start_time: 100

router_loss_weight: 0.01
layout: "h w t c"

checkpoint_path:
commit_sha:

model_cfg:
  in_channels: 4
  out_channels: 4
  in_timesteps: 8
  out_timesteps: 8
  n_blocks: 8
  modes: 32
  embed_dim: 768
  mlp_ratio: 1
  act: "gelu"
  img_size: 64
  patch_size: 4
  normalize: True
  time_agg: "mlp"
  n_cls: 6
  is_finetune: False
  mixing_type: "afno"
  depth: 8
  out_layer_dim: 256

defaults:
  - _self_
  - data_cfg: poolboiling64
  - optim_cfg: adamw
  - scheduler_cfg: trapezoidal
  - normalizer_cfg: standard