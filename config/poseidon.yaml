log_dir: /pub/afeeney/bubbleformer_logs
seed: 42

nodes: 1
devices: 1

max_epochs:
max_steps: 40000
val_check_interval: 2000
batch_size: 16
accumulate_grad_batches: 1

history_time_window: 1
future_time_window: 1
time_step: 1
start_time: 100

layout: "t c h w"

checkpoint_path:
commit_sha:

model_cfg:
  num_fluid_params: 16
  image_size: 64
  patch_size: 4
  num_channels: 4 # sdf, temp, velx, vely
  num_out_channels: 4 # sdf, temp, velx, vely
  embed_dim: 96
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  skip_connections: [2, 2, 2, 0]
  window_size: 7
  mlp_ratio: 4.0
  qkv_bias: True
  hidden_dropout_prob: 0.0
  attention_probs_dropout_prob: 0.0
  drop_path_rate: 0.1
  hidden_act: "gelu"
  use_absolute_embeddings: False
  initializer_range: 0.02
  layer_norm_eps: 1e-5
  p: 1  # for loss: 1 for l1, 2 for l2
  channel_slice_list_normalized_loss: [0, 1, 2, 3] # if None will fall back to absolute loss otherwise normalized loss with split channels
  residual_model: "convnext"  # "convnext" or "resnet"
  use_conditioning: False
  learn_residual: True  # learn the residual for time-dependent problems

defaults:
  - _self_
  - data_cfg: poolboiling64
  - optim_cfg: adamw
  - scheduler_cfg: trapezoidal
  - normalizer_cfg: standard